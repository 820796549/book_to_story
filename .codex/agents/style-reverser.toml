name = "style-reverser"
description = """
样文深反推专家。分析竞品/样文的标题、开头、逐段功能、痛点、误判、推理链、爽点句、现实迁移和结尾套路。
输出可入库写法和禁止照搬项。被 book-reverse-style 调用。
